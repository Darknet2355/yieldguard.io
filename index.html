<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YieldGuard AI • Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-card {
      background: rgba(24, 24, 27, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      border: 1px solid rgba(16, 185, 129, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }
    
    .auth-card:hover {
      transform: translateY(-5px);
    }
    
    .input-field {
      background: #18181b;
      border: 1px solid #3f3f46;
      transition: all 0.2s ease;
      color: white;
    }
    
    .input-field:focus {
      border-color: #10b981;
      outline: none;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
    }
    
    .auth-toggle {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .auth-toggle.active {
      background: #10b981;
      color: black;
    }
    
    .auth-toggle.inactive {
      background: transparent;
      color: #a1a1aa;
      border: 1px solid #3f3f46;
    }
    
    .auth-toggle.inactive:hover {
      background: #27272a;
      color: white;
    }
    
    .btn-primary {
      background: #10b981;
      transition: all 0.2s ease;
    }
    
    .btn-primary:hover {
      background: #059669;
      transform: scale(1.02);
    }
    
    .social-btn {
      background: #27272a;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .social-btn:hover {
      background: #3f3f46;
      transform: scale(1.02);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .form-container {
      animation: fadeIn 0.3s ease;
    }
    
    .error-message {
      color: #ef4444;
      font-size: 0.75rem;
      margin-top: 4px;
      display: none;
    }
    
    .success-message {
      color: #10b981;
      font-size: 0.75rem;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-3 bg-black/40 backdrop-blur-sm px-6 py-3 rounded-full border border-zinc-800">
        <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-2xl shadow-lg">🌾</div>
        <div class="text-left">
          <span class="text-xl font-bold text-white">YieldGuard</span>
          <p class="text-emerald-400 text-xs">AI Agent • Uganda</p>
        </div>
      </div>
    </div>

    <!-- Main Auth Card -->
    <div class="auth-card p-8">
      <!-- Toggle Buttons -->
      <div class="flex gap-3 mb-8">
        <button id="signin-toggle" class="auth-toggle active flex-1 py-3 rounded-xl font-semibold transition">Sign In</button>
        <button id="signup-toggle" class="auth-toggle inactive flex-1 py-3 rounded-xl font-semibold transition">Sign Up</button>
      </div>

      <!-- Sign In Form -->
      <div id="signin-form" class="form-container">
        <div class="space-y-5">
          <div>
            <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Email Address</label>
            <input type="email" id="login-email" class="input-field w-full px-5 py-3 rounded-xl text-sm" placeholder="farmer@example.com">
            <div id="login-email-error" class="error-message"></div>
          </div>
          <div>
            <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Password</label>
            <input type="password" id="login-password" class="input-field w-full px-5 py-3 rounded-xl text-sm" placeholder="••••••••">
            <div id="login-password-error" class="error-message"></div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-zinc-400 cursor-pointer">
              <input type="checkbox" id="remember-me" class="accent-emerald-500"> <span>Remember me</span>
            </label>
            <a href="#" class="text-emerald-400 hover:underline text-sm">Forgot password?</a>
          </div>
          <button onclick="handleLogin()" class="btn-primary w-full py-3 rounded-xl font-semibold text-black transition">Sign In</button>
          <p class="text-center text-zinc-500 text-xs pt-2">Demo: any email / password "demo123"</p>
        </div>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-form" class="form-container" style="display: none;">
        <div class="space-y-4">
          <div>
            <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Full Name</label>
            <input type="text" id="signup-name" class="input-field w-full px-5 py-3 rounded-xl text-sm" placeholder="Amina Nakato">
            <div id="signup-name-error" class="error-message"></div>
          </div>
          <div>
            <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Email Address</label>
            <input type="email" id="signup-email" class="input-field w-full px-5 py-3 rounded-xl text-sm" placeholder="farmer@example.com">
            <div id="signup-email-error" class="error-message"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">District</label>
              <select id="signup-district" class="input-field w-full px-4 py-3 rounded-xl text-sm">
                <option value="Mubende">Mubende</option>
                <option value="Masaka">Masaka</option>
                <option value="Kapchorwa">Kapchorwa</option>
                <option value="Jinja">Jinja</option>
                <option value="Gulu">Gulu</option>
                <option value="Mbale">Mbale</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Main Crop</label>
              <select id="signup-crop" class="input-field w-full px-4 py-3 rounded-xl text-sm">
                <option value="Matooke">Matooke</option>
                <option value="Maize">Maize</option>
                <option value="Beans">Beans</option>
                <option value="Cassava">Cassava</option>
              </select>
            </div>
          </div>
          <div>
            <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Password</label>
            <input type="password" id="signup-password" class="input-field w-full px-5 py-3 rounded-xl text-sm" placeholder="Min. 6 characters">
            <div id="signup-password-error" class="error-message"></div>
          </div>
          <div>
            <label class="text-xs text-zinc-400 uppercase font-semibold block mb-2">Confirm Password</label>
            <input type="password" id="signup-confirm" class="input-field w-full px-5 py-3 rounded-xl text-sm" placeholder="Confirm password">
            <div id="signup-confirm-error" class="error-message"></div>
          </div>
          <div class="flex items-start gap-3 text-xs text-zinc-400">
            <input type="checkbox" id="signup-terms" class="accent-emerald-500 mt-0.5">
            <span>I agree to the <a href="#" class="text-emerald-400 hover:underline">Terms</a> and <a href="#" class="text-emerald-400 hover:underline">Privacy Policy</a></span>
          </div>
          <button onclick="handleSignup()" class="btn-primary w-full py-3 rounded-xl font-semibold text-black transition">Create Account</button>
        </div>
      </div>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-zinc-800"></div></div>
        <div class="relative flex justify-center"><span class="px-3 bg-zinc-900 text-zinc-500 text-xs rounded-full">or continue with</span></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-2 gap-3">
        <button onclick="socialLogin('google')" class="social-btn flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-medium">
          <i class="fa-brands fa-google text-red-400"></i> Google
        </button>
        <button onclick="socialLogin('demo')" class="social-btn flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-medium">
          <i class="fa-solid fa-leaf text-emerald-400"></i> Demo Mode
        </button>
      </div>
    </div>

    <p class="text-center text-zinc-600 text-xs mt-6">© 2024 YieldGuard AI. Empowering Ugandan farmers.</p>
  </div>

  <script>
    // Toggle between Sign In and Sign Up
    const signinToggle = document.getElementById('signin-toggle');
    const signupToggle = document.getElementById('signup-toggle');
    const signinForm = document.getElementById('signin-form');
    const signupForm = document.getElementById('signup-form');

    signinToggle.addEventListener('click', () => {
      signinToggle.classList.add('active');
      signinToggle.classList.remove('inactive');
      signupToggle.classList.add('inactive');
      signupToggle.classList.remove('active');
      signinForm.style.display = 'block';
      signupForm.style.display = 'none';
    });

    signupToggle.addEventListener('click', () => {
      signupToggle.classList.add('active');
      signupToggle.classList.remove('inactive');
      signinToggle.classList.add('inactive');
      signinToggle.classList.remove('active');
      signupForm.style.display = 'block';
      signinForm.style.display = 'none';
    });

    // Clear error messages
    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
        el.textContent = '';
      });
      document.querySelectorAll('.success-message').forEach(el => {
        el.style.display = 'none';
      });
    }

    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
      }
    }

    // Handle Login
    function handleLogin() {
      clearErrors();
      
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const rememberMe = document.getElementById('remember-me').checked;
      
      let isValid = true;
      
      if (!email) {
        showError('login-email-error', 'Email is required');
        isValid = false;
      } else if (!email.includes('@')) {
        showError('login-email-error', 'Enter a valid email');
        isValid = false;
      }
      
      if (!password) {
        showError('login-password-error', 'Password is required');
        isValid = false;
      } else if (password.length < 3) {
        showError('login-password-error', 'Password must be at least 3 characters');
        isValid = false;
      }
      
      if (!isValid) return;
      
      // Demo login - accept any email with password "demo123"
      // Also check if user exists in localStorage
      const users = JSON.parse(localStorage.getItem('yieldguard_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      
      if (password === 'demo123' || user) {
        // Store session
        const sessionUser = user || { name: email.split('@')[0], email: email, district: 'Mubende', crop: 'Matooke' };
        localStorage.setItem('yieldguard_session', JSON.stringify({
          user: sessionUser,
          loggedIn: true,
          loginTime: new Date().toISOString()
        }));
        
        if (rememberMe) {
          localStorage.setItem('yieldguard_remember', email);
        }
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        showError('login-password-error', 'Invalid credentials. Try "demo123" as password');
      }
    }
    
    // Handle Signup
    function handleSignup() {
      clearErrors();
      
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const district = document.getElementById('signup-district').value;
      const crop = document.getElementById('signup-crop').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const terms = document.getElementById('signup-terms').checked;
      
      let isValid = true;
      
      if (!name) {
        showError('signup-name-error', 'Full name is required');
        isValid = false;
      } else if (name.length < 3) {
        showError('signup-name-error', 'Name must be at least 3 characters');
        isValid = false;
      }
      
      if (!email) {
        showError('signup-email-error', 'Email is required');
        isValid = false;
      } else if (!email.includes('@')) {
        showError('signup-email-error', 'Enter a valid email');
        isValid = false;
      }
      
      if (!password) {
        showError('signup-password-error', 'Password is required');
        isValid = false;
      } else if (password.length < 6) {
        showError('signup-password-error', 'Password must be at least 6 characters');
        isValid = false;
      }
      
      if (password !== confirm) {
        showError('signup-confirm-error', 'Passwords do not match');
        isValid = false;
      }
      
      if (!terms) {
        alert('Please agree to the Terms and Privacy Policy');
        isValid = false;
      }
      
      if (!isValid) return;
      
      // Check if user already exists
      const users = JSON.parse(localStorage.getItem('yieldguard_users') || '[]');
      if (users.some(u => u.email === email)) {
        showError('signup-email-error', 'Email already registered. Please sign in.');
        return;
      }
      
      // Create new user
      const newUser = {
        id: Date.now(),
        name: name,
        email: email,
        district: district,
        crop: crop,
        password: password,
        registeredAt: new Date().toISOString()
      };
      
      users.push(newUser);
      localStorage.setItem('yieldguard_users', JSON.stringify(users));
      
      // Auto-login after signup
      localStorage.setItem('yieldguard_session', JSON.stringify({
        user: newUser,
        loggedIn: true,
        loginTime: new Date().toISOString()
      }));
      
      // Show success and redirect
      alert('Account created successfully! Welcome to YieldGuard AI.');
      window.location.href = 'dashboard.html';
    }
    
    // Social login
    function socialLogin(type) {
      if (type === 'demo') {
        localStorage.setItem('yieldguard_session', JSON.stringify({
          user: { name: 'Demo Farmer', email: 'demo@yieldguard.ug', district: 'Mubende', crop: 'Matooke' },
          loggedIn: true,
          loginTime: new Date().toISOString()
        }));
        window.location.href = 'dashboard.html';
      } else if (type === 'google') {
        alert('Google login demo - In production, this would integrate with Google OAuth');
      }
    }
    
    // Check if already logged in
    const session = JSON.parse(localStorage.getItem('yieldguard_session') || '{}');
    if (session.loggedIn) {
      window.location.href = 'dashboard.html';
    }
    
    // Pre-fill demo credentials
    const rememberedEmail = localStorage.getItem('yieldguard_remember');
    if (rememberedEmail) {
      document.getElementById('login-email').value = rememberedEmail;
      document.getElementById('remember-me').checked = true;
    }
  </script>
</body>
</html>
