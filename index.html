<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YieldGuard AI • Uganda - Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #050505 100%);
      color: #f4f4f5;
      min-height: 100vh;
    }

    .glass {
      background: rgba(15, 15, 15, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(39, 39, 42, 0.6);
    }

    .logo-glow {
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md">
    
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-600/20 rounded-3xl mb-6 border border-emerald-500/30 logo-glow">
        <span class="text-5xl">🌾</span>
      </div>
      <h1 class="text-4xl font-bold tracking-tight">YieldGuard AI</h1>
      <p class="text-emerald-400 mt-2">Smart Farming Assistant • Uganda</p>
    </div>

    <!-- Main Card -->
    <div class="glass rounded-3xl shadow-2xl overflow-hidden">

      <!-- Tab Buttons -->
      <div class="flex border-b border-zinc-800">
        <button onclick="showTab(0)" id="tab-login" 
                class="flex-1 py-5 text-center font-semibold tab-btn active border-b-2 border-emerald-500 text-emerald-400">
          Sign In
        </button>
        <button onclick="showTab(1)" id="tab-signup" 
                class="flex-1 py-5 text-center font-semibold tab-btn text-zinc-400 hover:text-zinc-200">
          Create Account
        </button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="p-8 space-y-6">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Email or Phone Number</label>
          <input type="text" id="login-email" 
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" 
                 placeholder="e.g. +256 712 345 678 or email@farm.ug" />
        </div>

        <div>
          <div class="flex justify-between mb-2">
            <label class="block text-sm font-medium text-zinc-400">Password</label>
            <a href="#" onclick="showForgotPassword()" class="text-sm text-emerald-400 hover:text-emerald-300">Forgot password?</a>
          </div>
          <input type="password" id="login-password" 
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" 
                 placeholder="Enter your password" />
        </div>

        <button onclick="handleLogin()" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold text-lg transition-all">
          Sign In
        </button>

        <div class="text-center text-sm text-zinc-500">
          Don't have an account? 
          <span onclick="showTab(1)" class="text-emerald-400 hover:text-emerald-300 cursor-pointer font-medium">Create one</span>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signup-form" class="p-8 space-y-6 hidden">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">First Name</label>
            <input type="text" id="signup-firstname" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" placeholder="John" />
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">Last Name</label>
            <input type="text" id="signup-lastname" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" placeholder="Mukasa" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Phone Number</label>
          <input type="tel" id="signup-phone" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" placeholder="+256 712 345 678" />
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Email Address</label>
          <input type="email" id="signup-email" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" placeholder="you@farm.ug" />
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Create Password</label>
          <input type="password" id="signup-password" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" placeholder="••••••••" />
        </div>

        <button onclick="handleSignup()" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold text-lg transition-all">
          Create Account
        </button>

        <div class="text-center text-sm text-zinc-500">
          Already have an account? 
          <span onclick="showTab(0)" class="text-emerald-400 hover:text-emerald-300 cursor-pointer font-medium">Sign in</span>
        </div>
      </div>

      <!-- FORGOT PASSWORD FORM -->
      <div id="forgot-form" class="p-8 space-y-6 hidden">
        <h2 class="text-2xl font-semibold text-center">Reset Password</h2>
        <p class="text-center text-zinc-400 text-sm">We'll send a reset link to your email or phone.</p>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Email or Phone</label>
          <input type="text" id="forgot-contact" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition" placeholder="you@farm.ug or +256 712 345 678" />
        </div>

        <button onclick="handleForgotPassword()" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold text-lg transition-all">
          Send Reset Link
        </button>

        <div class="text-center">
          <button onclick="showTab(0)" class="text-emerald-400 hover:text-emerald-300 text-sm">← Back to Sign In</button>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center text-zinc-600 text-xs mt-8">
      © 2026 YieldGuard AI • Built for Ugandan Farmers
    </p>

  </div>

  <script>
    // Tab switching
    function showTab(tab) {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('signup-form').classList.add('hidden');
      document.getElementById('forgot-form').classList.add('hidden');

      document.getElementById('tab-login').classList.remove('active', 'border-b-2', 'border-emerald-500', 'text-emerald-400');
      document.getElementById('tab-signup').classList.remove('active', 'border-b-2', 'border-emerald-500', 'text-emerald-400');

      if (tab === 0) {
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('tab-login').classList.add('active', 'border-b-2', 'border-emerald-500', 'text-emerald-400');
      } else if (tab === 1) {
        document.getElementById('signup-form').classList.remove('hidden');
        document.getElementById('tab-signup').classList.add('active', 'border-b-2', 'border-emerald-500', 'text-emerald-400');
      }
    }

    // Handle Login
    function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();

      if (!email || !password) {
        alert("Please enter email/phone and password");
        return;
      }

      // Simulate successful login
      alert("✅ Login successful! Welcome back.");
      window.location.href = "dashboard.html";  // Change to your actual dashboard file name
    }

    // Handle Signup
    function handleSignup() {
      const firstname = document.getElementById('signup-firstname').value.trim();
      const lastname = document.getElementById('signup-lastname').value.trim();
      const phone = document.getElementById('signup-phone').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value.trim();

      if (!firstname || !lastname || !phone || !email || !password) {
        alert("Please fill all fields");
        return;
      }

      alert("✅ Account created successfully!\n\nYou can now sign in.");
      showTab(0);  // Switch back to login tab
    }

    // Handle Forgot Password
    function showForgotPassword() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('forgot-form').classList.remove('hidden');
    }

    function handleForgotPassword() {
      const contact = document.getElementById('forgot-contact').value.trim();
      if (!contact) {
        alert("Please enter your email or phone number");
        return;
      }
      alert(`✅ Reset link sent to ${contact}\n\nCheck your inbox or SMS.`);
      showTab(0);
    }

    // Keyboard support (Enter key)
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const activeForm = document.querySelector('.form-content:not(.hidden)');
        if (activeForm) {
          if (document.getElementById('login-form').classList.contains('hidden') === false) handleLogin();
          else if (document.getElementById('signup-form').classList.contains('hidden') === false) handleSignup();
          else if (document.getElementById('forgot-form').classList.contains('hidden') === false) handleForgotPassword();
        }
      }
    });

    // Default: Show login form
    window.onload = () => {
      showTab(0);
    };
  </script>
</body>
</html>
